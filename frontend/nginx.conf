server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router handles routing client-side. If someone refreshes the
    # page on /submit, Nginx would normally 404 looking for a literal
    # "submit" file. This line tells it to fall back to index.html instead,
    # so React Router can take over and render the right page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kubernetes/ALB health check target
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
