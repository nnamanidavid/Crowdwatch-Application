server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward all /api requests to the gateway
    # The frontend sends to /api/auth/signup, Nginx strips /api
    # and forwards to http://gateway-service:3004/auth/signup
    location /api/ {
        proxy_pass http://gateway-service:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $content_type;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}